<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Submit a product review with ratings, feature feedback, and optional comments.">
  <meta name="author" content="Sherelton Blessing Dennis">
  <title>Product Review Form</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;600;700&family=Source+Sans+3:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles/form.css">
  <script src="scripts/form.js" defer></script>
  <script src="scripts/getdates.js" defer></script>
</head>
<body>
  <a class="skip-link" href="#main-content">Skip to main content</a>

  <header class="page-header">
    <div class="header-inner">
      <h1>Product Proview come</h1>
    </div>
  </header>

  <main id="main-content" class="form-shell">
    <form action="review.html" method="get" class="review-form">
      <div class="form-group">
        <label for="productName">Product Name <span class="required" aria-hidden="true">*</span><span class="sr-only">Required</span></label>
        <select id="productName" name="productName" required>
          <option value="" disabled selected>Select a Product ...</option>
        </select>
      </div>

      <fieldset class="form-group">
        <legend>Overall Rating <span class="required" aria-hidden="true">*</span><span class="sr-only">Required</span></legend>
        <div class="rating-grid">
          <div class="rating-option">
            <input type="radio" id="rating-1" name="overallRating" value="1" required>
            <label for="rating-1">1 <span class="rating-stars" aria-hidden="true">&#9733;</span><span class="sr-only">out of 5</span></label>
          </div>
          <div class="rating-option">
            <input type="radio" id="rating-2" name="overallRating" value="2" required>
            <label for="rating-2">2 <span class="rating-stars" aria-hidden="true">&#9733;&#9733;</span><span class="sr-only">out of 5</span></label>
          </div>
          <div class="rating-option">
            <input type="radio" id="rating-3" name="overallRating" value="3" required>
            <label for="rating-3">3 <span class="rating-stars" aria-hidden="true">&#9733;&#9733;&#9733;</span><span class="sr-only">out of 5</span></label>
          </div>
          <div class="rating-option">
            <input type="radio" id="rating-4" name="overallRating" value="4" required>
            <label for="rating-4">4 <span class="rating-stars" aria-hidden="true">&#9733;&#9733;&#9733;&#9733;</span><span class="sr-only">out of 5</span></label>
          </div>
          <div class="rating-option">
            <input type="radio" id="rating-5" name="overallRating" value="5" required>
            <label for="rating-5">5 <span class="rating-stars" aria-hidden="true">&#9733;&#9733;&#9733;&#9733;&#9733;</span><span class="sr-only">out of 5</span></label>
          </div>
        </div>
      </fieldset>

      <div class="form-group">
        <label for="installDate">Date of Installation <span class="required" aria-hidden="true">*</span><span class="sr-only">Required</span></label>
        <input type="date" id="installDate" name="installDate" required>
      </div>

      <fieldset class="form-group">
        <legend>Useful Features</legend>
        <div class="feature-grid">
          <label class="checkbox-option" for="feature-durability">
            <input type="checkbox" id="feature-durability" name="features" value="Durability">
            Durability
          </label>
          <label class="checkbox-option" for="feature-ease">
            <input type="checkbox" id="feature-ease" name="features" value="Ease of Use">
            Ease of Use
          </label>
          <label class="checkbox-option" for="feature-performance">
            <input type="checkbox" id="feature-performance" name="features" value="Performance">
            Performance
          </label>
          <label class="checkbox-option" for="feature-design">
            <input type="checkbox" id="feature-design" name="features" value="Design">
            Design
          </label>
          <label class="checkbox-option" for="feature-value">
            <input type="checkbox" id="feature-value" name="features" value="Value">
            Value for Money
          </label>
        </div>
      </fieldset>

      <div class="form-group">
        <label for="writtenReview">Written Review</label>
        <textarea id="writtenReview" name="writtenReview" rows="4" placeholder="Share any additional thoughts..."></textarea>
      </div>

      <div class="form-group">
        <label for="userName">Your Name</label>
        <input type="text" id="userName" name="userName" autocomplete="name" placeholder="Optional">
      </div>

      <div class="form-actions">
        <input type="submit" value="Submit Review">
        <p class="helper">Required fields are marked with *.</p>
      </div>
    </form>
  </main>

  <footer>
    <p>&copy; <span id="currentyear"></span> &#x1F338; Sherelton Blessing Dennis &#x1F338; Liberia</p>
    <p id="lastModified"></p>
  </footer>
</body>
</html>
