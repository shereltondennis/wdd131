<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Explore Monrovia, Liberia with key facts, a featured image, and local weather details.">
    <meta name="author" content="Sherelton Blessing Dennis">
    <title>Monrovia, Liberia</title>
    <link rel="stylesheet" href="styles/place.css">
    <script src="scripts/place.js" defer></script>
</head>
<body>
    <a class="skip-link" href="#main-content">Skip to main content</a>

    <header class="site-header">
        <h1>Monrovia, Liberia</h1>
    </header>

    <main id="main-content">
        <section class="hero">
            <picture>
                <source
                    type="image/webp"
                    srcset="images/liberia-hero-small.webp 600w, images/liberia-hero-large.webp 1200w"
                    sizes="(max-width: 640px) 100vw, 1200px">
                <img
                    class="hero-image"
                    src="images/liberiaflg.jpg"
                    alt="Flag of Liberia waving in the wind"
                    width="1200"
                    height="800"
                    loading="lazy">
            </picture>
        </section>

        <section class="info-card data-card">
            <h2>Data</h2>
            <dl class="info-list">
                <div class="info-row">
                    <dt>Country</dt>
                    <dd>Liberia</dd>
                </div>
                <div class="info-row">
                    <dt>Region</dt>
                    <dd>Montserrado County</dd>
                </div>
                <div class="info-row">
                    <dt>Population</dt>
                    <dd>1.8M (metro)</dd>
                </div>
                <div class="info-row">
                    <dt>Language</dt>
                    <dd>English</dd>
                </div>
                <div class="info-row">
                    <dt>Currency</dt>
                    <dd>Liberian dollar (LRD)</dd>
                </div>
                <div class="info-row">
                    <dt>Time Zone</dt>
                    <dd>GMT</dd>
                </div>
            </dl>
        </section>

        <section class="info-card weather-card">
            <div class="weather-header">
                <h2>Weather</h2>
                <img class="weather-icon" src="images/partly-cloudy.svg" alt="Partly cloudy">
            </div>
            <dl class="info-list">
                <div class="info-row">
                    <dt>Temperature</dt>
                    <dd><span id="temperature">28</span> &deg;C</dd>
                </div>
                <div class="info-row">
                    <dt>Wind</dt>
                    <dd><span id="wind">7</span> km/h</dd>
                </div>
                <div class="info-row">
                    <dt>Wind Chill</dt>
                    <dd><span id="windchill">N/A</span></dd>
                </div>
                <div class="info-row">
                    <dt>Conditions</dt>
                    <dd><span id="conditions">Partly cloudy</span></dd>
                </div>
            </dl>
        </section>
    </main>

    <footer class="site-footer">
        <p>&copy; <span id="currentyear"></span> Sherelton Blessing Dennis &middot; Liberia</p>
        <p id="lastModified"></p>
    </footer>
</body>
</html>
